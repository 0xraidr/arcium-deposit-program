[toolchain]
package_manager = "yarn"
anchor_version = "1.0.2"

[features]
resolution = true
skip-lint = false

[programs.localnet]
encrypted_deposit = "D29HHVZiZWc1cbR8nDnjfTg8CHEJmLrau3NbcnteFzi"

[programs.devnet]
encrypted_deposit = "D29HHVZiZWc1cbR8nDnjfTg8CHEJmLrau3NbcnteFzi"

[provider]
cluster = "devnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 \"tests/**/*.ts\""

[hooks]

[test]
startup_wait = 120000
shutdown_wait = 2000
upgradeable = false

[test.validator]
bind_address = "127.0.0.1"
